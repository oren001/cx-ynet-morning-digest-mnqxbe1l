name = "ynet-personal-digest"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

workers_dev = true

[env.production]
name = "ynet-personal-digest-prod"

[triggers]
crons = ["0 6 * * *"]

[[kv_namespaces]]
binding = "DIGEST_KV"
id = "your_digest_kv_namespace_id"
preview_id = "your_digest_kv_preview_namespace_id"

[vars]
ENVIRONMENT = "production"
SCRAPE_RATE_LIMIT_PER_HOUR = "30"
MAX_ARTICLES_PER_SCRAPE = "50"
DIGEST_ARTICLE_COUNT = "10"
USER_AGENT = "YnetPersonalDigest/1.0 (Educational Project)"

[observability]
enabled = true

[placement]
mode = "smart"