```html

    <style>
        * {

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            min-height: 100vh;

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            color: #667eea;

        .header .current-date {

        .header .actions {
            display: flex;
            gap: 10px;

        .btn {
            padding: 10px 20px;

            border-radius: 8px;

        }

        .btn-primary {
            background: #667eea;
            color: white;

        .btn-primary:hover {
            background: #5568d3;

        .btn-secondary {

        .card h2 {

        .stat-label {

        .loading-spinner::after {
            content: '...';
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .error {

            padding: 40px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
            }

            .header .user-info {
                flex-direction: column;

            .header .actions {

    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 לוח הבקרה שלי</h1>
            <div class="user-info">
                <div>
                    <span class="user-email" id="userEmail">טוען...</span>
                    <div class="current-date" id="currentDate"></div>
                </div>
                <div class="actions">
                    <a href="/" class="btn btn-secondary">חזרה לעמוד הראשי</a>
                    <button class="btn btn-primary" id="refreshBtn">רענן נתונים</button>
                </div>
            </div>
        </div>

        <div id="messageContainer"></div>

        <div id="dashboardContent" class="loading-spinner">טוען נתונים</div>
    </div>

    <script>
        let userId = null;

        function showMessage(message, type = 'error') {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = type;
            div.textContent = message;
            container.appendChild(div);
            setTimeout(() => div.remove(), 5000);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            
            if (days === 0) {
                const hours = Math.floor(diff / (1000 * 60 * 60));
                if (hours === 0) {
                    const minutes = Math.floor(diff / (1000 * 60));
                    return `לפני ${minutes} דקות`;
                }
                return `לפני ${hours} שעות`;
            } else if (days === 1) {
                return 'אתמול';
            } else if (days < 7) {
                return `לפני ${days} ימים`;
            } else {
                return date.toLocaleDateString('he-IL');
            }
        }

        function updateCurrentDate() {
            const dateElement = document.getElementById('currentDate');
            if (dateElement) {
                const now = new Date();
                const formattedDate = now.toLocaleDateString('en-GB');
                dateElement.textContent = formattedDate;
            }
        }

        function renderDashboard(data) {
            const content = document.getElementById('dashboardContent');
            
            const stats = data.analytics || {};
            const preferences = data.preferences || {};
            const history = data.history || [];
            const articles = data.articles || [];

            const totalReads = parseInt(stats.totalArticlesRead) || 0;
            const readingStreak = parseInt(stats.readingStreak) || 0;
            const totalDigests = parseInt(stats.totalDigests) || 0;
            const avgArticles = parseFloat(stats.avgArticlesPerDay) || 0;

            content.innerHTML = `
                <div class="dashboard-grid">
                    <div class="card">
                        <h2>📈 סטטיסטיקות כלליות</h2>
                        <div class="stat-box">
                            <span class="stat-label">כתבות שנקראו</span>
                            <span class="stat-value">${totalReads}</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">ימי קריאה רצופים</span>
                            <span class="stat-value">${readingStreak}</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">תקצירים שנוצרו</span>
                            <span class="stat-value">${totalDigests}</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">ממוצע כתבות ליום</span>
                            <span class="stat-value">${avgArticles.toFixed(1)}</span>
                        </div>
                    </div>

                    <div class="card">
                        <h2>🎯 העדפות לפי קטגוריה</h2>
                        <div id="categoryPreferences"></div>
                    </div>

                    <div class="card">
                        <h2>⚙️ הגדרות אישיות</h2>
                        <form class="settings-form" id="settingsForm">
                            <div class="form-group">
                                <label for="digestTime">שעת משלוח תקציר יומי</label>
                                <input type="time" id="digestTime" value="${preferences.digestTime || '06:00'}">
                            </div>
                            <div class="form-group">
                                <label for="articlesPerDigest">מספר כתבות בתקציר</label>
                                <select id="articlesPerDigest">
                                    <option value="5" ${preferences.articlesPerDigest === 5 ? 'selected' : ''}>5 כתבות</option>
                                    <option value="10" ${preferences.articlesPerDigest === 10 ? 'selected' : ''}>10 כתבות</option>
                                    <option value="15" ${preferences.articlesPerDigest === 15 ? 'selected' : ''}>15 כתבות</option>
                                    <option value="20" ${preferences.articlesPerDigest === 20 ? 'selected' : ''}>20 כתבות</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="emailNotifications" ${preferences.emailNotifications !== false ? 'checked' : ''}>
                                    <label for="emailNotifications">שלח התראות במייל</label>
                                </div>
                            </div>
                            <div class="form-group">
                                <div class="checkbox-group">
                                    <input type="checkbox" id="weekendDigests" ${preferences.weekendDigests !== false ? 'checked' : ''}>
                                    <label for="weekendDigests">כלול תקצירים בסופי שבוע</label>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary">שמור הגדרות</button>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <h2>📚 היסטוריית קריאה אחרונה</h2>
                    <div class="reading-list" id="readingHistory"></div>
                </div>

                ${articles.length > 0 ? `
                <div class="card">
                    <h2>📰 מאמרים אחרונים</h2>
                    <div class="reading-list" id="articlesList"></div>
                </div>
                ` : ''}
            `;

            renderCategoryPreferences(preferences.categoryWeights || {});
            renderReadingHistory(history);
            if (articles.length > 0) {
                renderArticlesList(articles);
            }
            attachEventListeners();
        }

        function renderCategoryPreferences(weights) {
            const container = document.getElementById('categoryPreferences');
            if (!weights || Object.keys(weights).length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📖</div><p>התחל לקרוא כתבות כדי לבנות העדפות</p></div>';
                return;
            }

            const maxScore = Math.max(...Object.values(weights));
            const sortedCategories = Object.entries(weights).sort((a, b) => b[1] - a[1]);

            container.innerHTML = sortedCategories.map(([category, score]) => {
                const percentage = maxScore > 0 ? (score / maxScore) * 100 : 0;
                return `
                    <div class="category-item">
                        <span class="category-name">${category}</span>
                        <div class="category-bar">
                            <div class="category-bar-fill" style="width: ${percentage}%"></div>
                        </div>
                        <span class="category-score">${Math.round(score)}</span>
                    </div>
                `;
            }).join('');
        }

        function renderReadingHistory(history) {
            const container = document.getElementById('readingHistory');
            if (!history || history.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📰</div><p>עדיין לא קראת כתבות</p></div>';
                return;
            }

            container.innerHTML = history.slice(0, 10).map(item => `
                <div class="reading-item" onclick="window.open('${item.url || item.articleUrl || '#'}', '_blank')">
                    <div class="reading-item-title">${item.title || 'כתבה'}</div>
                    <div class="reading-item-meta">
                        <span>${item.category || 'כללי'}</span>
                        <span>${formatDate(item.timestamp || item.date)}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderArticlesList(articles) {
            const container = document.getElementById('articlesList');
            if (!articles || articles.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📰</div><p>אין מאמרים זמינים</p></div>';
                return;
            }

            container.innerHTML = articles.slice(0, 10).map(article => `
                <div class="article-item" data-article-id="${article.id || article.url}" onclick="handleArticleClick(this, '${article.url}', '${(article.title || '').replace(/'/g, "\\'")}', '${article.category || ''}')">
                    <div class="reading-item-title">${article.title || 'כתבה'}</div>
                    <div class="reading-item-meta">
                        <span>${article.category || 'כללי'}</span>
                        <span>${article.source || 'ynet'}</span>
                    </div>
                </div>
            `).join('');
        }

        async function handleArticleClick(element, url, title, category) {
            if (userId && url) {
                try {
                    await fetch('/api/track-reading', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            userId,
                            articleUrl: url,
                            title: title,
                            category: category,
                            timestamp: new Date().toISOString()
                        })
                    });
                } catch (error) {
                    console.error('Error tracking reading:', error);
                }
            }
            window.open(url, '_blank');
        }

        function attachEventListeners() {
            const settingsForm = document.getElementById('settingsForm');
            if (settingsForm) {
                settingsForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await saveSettings();
                });
            }

            const refreshBtn = document.getElementById('refreshBtn');
            if (refreshBtn) {
                refreshBtn.addEventListener('click', async () => {
                    const content = document.getElementById('dashboardContent');
                    content.className = 'loading';
                    content.textContent = 'טוען נתונים';
                    await loadDashboard();
                });
            }
        }

        async function saveSettings() {
            try {
                const digestTime = document.getElementById('digestTime').value;
                const articlesPerDigest = parseInt(document.getElementById('articlesPerDigest').value);
                const emailNotifications = document.getElementById('emailNotifications').checked;
                const weekendDigests = document.getElementById('weekendDigests').checked;

                const response = await fetch('/api/preferences', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        userId,
                        preferences: {
                            digestTime,
                            articlesPerDigest,
                            emailNotifications,
                            weekendDigests
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error('שגיאה בשמירת הגדרות');
                }

                showMessage('ההגדרות נשמרו בהצלחה!', 'success');
            } catch (error) {
                console.error('Error saving settings:', error);
                showMessage('שגיאה בשמירת הגדרות. נסה שוב.');
            }
        }

        async function loadDashboard() {
            try {
                const content = document.getElementById('dashboardContent');
                content.className = 'loading-spinner';
                content.textContent = 'טוען נתונים';

                const response = await fetch(`/api/dashboard?userId=${userId}`);
                
                if (!response.ok) {
                    throw new Error('Failed to load dashboard data');
                }

                const data = await response.json();
                
                content.className = '';
                renderDashboard(data);
            } catch (error) {
                console.error('Error loading dashboard:', error);
                const content = document.getElementById('dashboardContent');
                content.className = '';
                content.innerHTML = '<div class="error">שגיאה בטעינת הנתונים. אנא נסה שוב.</div>';
            }
        }

        window.addEventListener('DOMContentLoaded', () => {
            userId = localStorage.getItem('userId');
            
            if (!userId) {
                window.location.href = '/';
                return;
            }

            const userEmail = localStorage.getItem('userEmail');
            if (userEmail) {
                document.getElementById('userEmail').textContent = userEmail;
            }

            updateCurrentDate();
            loadDashboard();
        });
    </script>
</body>
</html>
